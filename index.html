<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seif Badawi | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --surface: #0f0f0f; --accent: #11a9e3; --text-main: #ffffff; --text-dim: #a0a0a0; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', 'Noto Kufi Arabic', sans-serif; line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { display: flex; align-items: center; gap: 15px; font-weight: 700; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .logo-img { height: 40px; width: auto; border-radius: 4px; }
        .side-menu { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background-color: #0a1114; overflow-x: hidden; transition: 0.4s; padding-top: 60px; border-left: 1px solid var(--accent); box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .side-menu h3 { color: var(--text-dim); padding: 0 32px; margin-bottom: 20px; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .side-menu a { padding: 15px 32px; text-decoration: none; font-size: 1.2rem; color: var(--text-main); display: block; transition: 0.3s; font-weight: bold; }
        .side-menu a:hover { color: var(--accent); background-color: rgba(17, 169, 227, 0.1); }
        .side-menu .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; padding: 0; }
        .overlay-bg { display: none; position: fixed; width: 100%; height: 100%; top: 0; left: 0; background-color: rgba(0,0,0,0.7); z-index: 1500; }
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; background: radial-gradient(circle at 80% 20%, #082a3a 0%, #050505 50%); }
        .hero-tag { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-bottom: 20px; }
        header h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; line-height: 1; margin-bottom: 30px; }
        .accent-text { color: transparent; -webkit-text-stroke: 1px var(--text-main); }
        .work { padding: 100px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .card { position: relative; background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .overlay { position: absolute; inset: 0; padding: 40px; background: rgba(0,0,0,0.85); opacity: 0; transition: 0.4s; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .card:hover .overlay { opacity: 1; }
        footer { padding: 50px 10%; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <h3>تواصل معي عبر</h3>
        <a href="https://wa.me/201200819703" target="_blank">📱 واتساب</a>
        <a href="mailto:seifbadawy58@gmail.com">📧 إيميل</a>
        <a href="Https://www.facebook.com/share/1FLqti9mNP/" target="_blank">📘 فيسبوك</a>
        <a href="https://www.instagram.com/so00ofaa?igsh=MWplejk5Mm9xdjNneA==" target="_blank">📸 إنستجرام</a>
    </div>
    <div id="overlay" class="overlay-bg" onclick="closeNav()"></div>
    <nav>
        <div class="logo" onclick="openNav()">
            <img src="1000078070.png" alt="Logo" class="logo-img">
            SAIF DESIGNS
        </div>
    </nav>
    <header>
        <span class="hero-tag">Graphic Designer</span>
        <h1>BUILDING <span class="accent-text">BRANDS</span><br>THAT LAST.</h1>
    </header>
    <section class="work">
        <div class="grid">
            <div class="card"><img src="1000078076.png" class="card-img"><div class="overlay"><h3>BIM Solutions</h3></div></div>
            <div class="card"><img src="1000078075.png" class="card-img"><div class="overlay"><h3>Vodafone</h3></div></div>
            <div class="card"><img src="1000078074.png" class="card-img"><div class="overlay"><h3>Logitech</h3></div></div>
            <div class="card"><img src="1000078073.png" class="card-img"><div class="overlay"><h3>Perfume</h3></div></div>
            <div class="card"><img src="1000078072.png" class="card-img"><div class="overlay"><h3>MSI</h3></div></div>
            <div class="card"><img src="1000078071.png" class="card-img"><div class="overlay"><h3>Nike</h3></div></div>
        </div>
    </section>
    <footer><p>&copy; 2026 Seif Badawi</p></footer>
    <script>
        function openNav() { document.getElementById("side-menu").style.width = "300px"; document.getElementById("overlay").style.display = "block"; }
        function closeNav() { document.getElementById("side-menu").style.width = "0"; document.getElementById("overlay").style.display = "none"; }
    </script>
</body>
</html>
